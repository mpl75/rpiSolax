# =====================================================================
#  Solax FVE – přídavek do existujícího vhostu rpi.politzer.cz:443
#  Vlož DOVNITŘ <VirtualHost *:443> v /etc/apache2/sites-available/rpi-gallery.conf,
#  vedle pravidel pro galerii. NIC z galerie nemažeme, jen přidáváme.
#  Po úpravě: sudo apache2ctl configtest && sudo systemctl reload apache2
# =====================================================================

# Vstupní bod aplikace – /solax obslouží rpiSolax/index.php.
# (assety i JSON API jdou přes index.php pomocí ?asset= / ?api=, takže
#  stačí povolit jen /solax a /rpiSolax/index.php.)
RewriteRule ^/solax/?$ /rpiSolax/index.php [L,QSA]

# Do whitelistu (bloku "vše ostatní -> 404") přidej tyto dvě výjimky.
# Konkrétně mezi stávající RewriteCond ... a závěrečné
#   RewriteRule ^ - [R=404,L]
# vlož:
#   RewriteCond %{REQUEST_URI} !^/solax
#   RewriteCond %{REQUEST_URI} !^/rpiSolax/index\.php
